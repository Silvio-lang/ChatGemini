<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Carrinho do vô Silvio</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        canvas { display: block; background: #333; }
        #hud { position: absolute; top: 10px; left: 0; width: 100%; display: flex; justify-content: center; gap: 15px; pointer-events: none; z-index: 10; }
        .stat { color: white; background: rgba(0,0,0,0.7); padding: 8px 15px; border-radius: 15px; font-size: 1.2em; border: 2px solid #FFD700; display: flex; align-items: center; }
        #parking-checklist { border-color: #00FF00; font-size: 0.9em; flex-direction: column; align-items: flex-start; display: none; min-width: 120px; }
        .chk-item { color: #888; transition: color 0.3s; }
        #msg { position: absolute; top: 50%; width: 100%; text-align: center; color: #FFD700; font-size: 3em; font-weight: bold; text-shadow: 2px 2px 5px black; display: none; pointer-events: none; z-index: 100; }
    </style>
</head>
<body>

<div id="hud">
    <div class="stat">PONTOS: <span id="score">0</span></div>
    
    <div id="parking-checklist" class="stat">
        <div id="chk-inside" class="chk-item">○ DENTRO</div>
        <div id="chk-aligned" class="chk-item">○ ALINHADO</div>
        <div id="chk-centered" class="chk-item">○ NO CENTRO</div>
    </div>

    <div class="stat" id="objective-text">Pegue as frutas! 🍎</div>
</div>

<div id="msg">PARABÉNS!  ESTACIONADO! 🌟</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let width, height, score = 0;
const scoreEl = document.getElementById('score');
const msgEl = document.getElementById('msg');
const objText = document.getElementById('objective-text');
const checklistEl = document.getElementById('parking-checklist');

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}
window.onresize = resize;
resize();

// --- CONFIGURAÇÕES ---
const L = 50; 
const carBodyW = L + 20;
const carBodyH = 40;

let car = {
    x: width / 2, y: height / 2,
    theta: -Math.PI / 2, v: 0, targetV: 0, alpha: 0,
    color: '#FFD700'
};

let fruits = [];
let parkingSpot = null;
let difficultyLevel = 1;
const fruitTypes = ['🍎', '🍌', '🍇', '🍓', '🍒', '🍊'];

function spawnFruit() {
    fruits.push({
        x: 50 + Math.random() * (width - 100),
        y: 50 + Math.random() * (height - 100),
        type: fruitTypes[Math.floor(Math.random() * fruitTypes.length)]
    });
}

function spawnParkingSpot() {
    let w = 100, h = 140, x, y;
    if (difficultyLevel === 1) {
        x = width * 0.3 + Math.random() * (width * 0.4);
        y = height * 0.3 + Math.random() * (height * 0.4);
    } else {
        w = Math.max(70, 110 - difficultyLevel * 5);
        h = Math.max(90, 150 - difficultyLevel * 5);
        x = 100 + Math.random() * (width - 200);
        y = 100 + Math.random() * (height - 200);
    }

    parkingSpot = {
        x: x, y: y, w: w, h: h,
        angle: Math.random() * Math.PI,
        active: true,
        color: 'rgba(76, 175, 80, 0.4)'
    };
    objText.innerText = "Nível " + difficultyLevel + ": Estacione! 🅿️";
}

// Inicializar
function startNewRound() {
    const fruitCount = 3 + Math.floor(score / 200);
    for(let i=0; i<fruitCount; i++) spawnFruit();
}
startNewRound();

// --- INPUTS ---
let pointer = { x: 0, y: 0, active: false };
function updatePointer(e) {
    const rect = canvas.getBoundingClientRect();
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    pointer.x = cx - rect.left;
    pointer.y = cy - rect.top;
}
canvas.addEventListener('mousedown', (e) => { 
    pointer.active = true; 
    updatePointer(e); 
    // Penalidade por clique (Opção B: -1 ponto, mínimo 0)
    if (score > 0) {
        score--;
        scoreEl.innerText = score;
    }
});
canvas.addEventListener('mousemove', (e) => { if(pointer.active) updatePointer(e); });
window.addEventListener('mouseup', () => { pointer.active = false; });
canvas.addEventListener('touchstart', (e) => { 
    e.preventDefault(); 
    pointer.active = true; 
    updatePointer(e); 
    // Penalidade por toque (Opção B: -1 ponto, mínimo 0)
    if (score > 0) {
        score--;
        scoreEl.innerText = score;
    }
}, {passive: false});
canvas.addEventListener('touchmove', (e) => { e.preventDefault(); updatePointer(e); }, {passive: false});
canvas.addEventListener('touchend', () => { pointer.active = false; }, {passive: false});

// --- LÓGICA ---
function checkCollisions() {
    // 1. Frutas
    for (let i = fruits.length - 1; i >= 0; i--) {
        const f = fruits[i];
        const dist = Math.sqrt((car.x - f.x)**2 + (car.y - f.y)**2);
        if (dist < 40) {
            fruits.splice(i, 1);
            score += 10;
            scoreEl.innerText = score;
            if (fruits.length === 0) spawnParkingSpot();
        }
    }

    // 2. Vaga (COM CHECKLIST)
    if (parkingSpot && parkingSpot.active) {
        checklistEl.style.display = 'flex';
        
        // Centro do carro (ponto médio entre os eixos para simplificar)
        const carCenterX = car.x + (L/2) * Math.cos(car.theta);
        const carCenterY = car.y + (L/2) * Math.sin(car.theta);
        
        // Coordenadas Locais (Translação e Rotação)
        // Movemos a origem para o centro da vaga e rotacionamos para o sistema da vaga
        const dx = carCenterX - parkingSpot.x;
        const dy = carCenterY - parkingSpot.y;
        
        // Rotacionar o vetor (dx, dy) pelo ângulo oposto da vaga
        const localX = dx * Math.cos(-parkingSpot.angle) - dy * Math.sin(-parkingSpot.angle);
        const localY = dx * Math.sin(-parkingSpot.angle) + dy * Math.cos(-parkingSpot.angle);

        // Diferença de ângulo considerando que o carro desenhado "frente" está no eixo X (car.theta)
        // E a vaga é um retângulo vertical (W < H) ou horizontal.
        // Vamos normalizar a diferença de ângulo para [0, PI/2]
        let angleDiff = Math.abs(car.theta - (parkingSpot.angle + Math.PI/2)) % Math.PI;
        if (angleDiff > Math.PI / 2) angleDiff = Math.PI - angleDiff;

        // Requisitos Refinados (Ajustados para uma criança de 4 anos)
        // 1. DENTRO: O centro do carro está dentro dos limites do retângulo da vaga
        const isInside = Math.abs(localX) < parkingSpot.w/2 && Math.abs(localY) < parkingSpot.h/2;
        
        // 2. ALINHADO: Mais tolerante (25 graus em vez de 12)
        const isAligned = angleDiff < (25 * Math.PI / 180); 

        // 3. NO CENTRO: Ajustado para 6 unidades (equilíbrio entre desafio e precisão)
        const isCentered = Math.abs(localX) < 6 && Math.abs(localY) < 6; 

        // Atualiza UI
        const updateUI = (id, val, text) => {
            const el = document.getElementById(id);
            if (val) {
                el.style.color = "#00FF00";
                el.innerText = "✅ " + text;
            } else {
                el.style.color = "#888";
                el.innerText = "○ " + text;
            }
        };

        updateUI('chk-inside', isInside, "DENTRO");
        updateUI('chk-aligned', isAligned, "ALINHADO");
        updateUI('chk-centered', isCentered, "NO CENTRO");

        // Feedback visual da vaga
        if (isInside && isAligned && isCentered) {
            parkingSpot.color = 'rgba(0, 255, 0, 0.9)';
        } else if (isInside) {
            parkingSpot.color = 'rgba(255, 165, 0, 0.6)';
        } else {
            parkingSpot.color = 'rgba(76, 175, 80, 0.4)';
        }

        // Sucesso: Mais permissivo na velocidade (0.6 em vez de 0.3)
        if (isCentered && isAligned && Math.abs(car.v) < 0.6) {
            parkingSpot.active = false;
            score += 50 * difficultyLevel;
            scoreEl.innerText = score;
            msgEl.style.display = 'block';
            difficultyLevel++;
            checklistEl.style.display = 'none';
            setTimeout(() => {
                msgEl.style.display = 'none';
                parkingSpot = null;
                startNewRound();
                objText.innerText = "Pegue as frutas! 🍎";
            }, 2000);
        }
    } else {
        checklistEl.style.display = 'none';
    }
}

function processControl() {
    const vCX = car.x + (L/2) * Math.cos(car.theta);
    const vCY = car.y + (L/2) * Math.sin(car.theta);

    if (!pointer.active) { car.targetV = 0; car.alpha = 0; }
    else {
        const dx = pointer.x - vCX, dy = pointer.y - vCY;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 20) { car.targetV = 0; car.alpha = 0; }
        else {
            const a = Math.atan2(dy, dx);
            let rel = a - car.theta;
            while (rel > Math.PI) rel -= Math.PI * 2;
            while (rel < -Math.PI) rel += Math.PI * 2;
            const deg = rel * 180 / Math.PI;

            if (Math.abs(deg) < 60) car.targetV = 2;
            else if (Math.abs(deg) > 120) car.targetV = -1.25;
            else car.targetV = 0;

            if (deg > 15 && deg < 165) car.alpha = Math.PI / 4;
            else if (deg < -15 && deg > -165) car.alpha = -Math.PI / 4;
            else car.alpha = 0;
        }
    }
    const acc = 0.04;
    if (car.v < car.targetV) car.v = Math.min(car.targetV, car.v + acc);
    else if (car.v > car.targetV) car.v = Math.max(car.targetV, car.v - acc);
}

function draw() {
    ctx.clearRect(0, 0, width, height);
    ctx.strokeStyle = '#444';
    for(let i=0; i<width; i+=80) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,height); ctx.stroke(); }
    for(let j=0; j<height; j+=80) { ctx.beginPath(); ctx.moveTo(0,j); ctx.lineTo(width,j); ctx.stroke(); }

    if (parkingSpot) {
        ctx.save();
        ctx.translate(parkingSpot.x, parkingSpot.y);
        ctx.rotate(parkingSpot.angle);
        ctx.fillStyle = parkingSpot.active ? parkingSpot.color : 'rgba(255, 215, 0, 0.6)';
        ctx.fillRect(-parkingSpot.w/2, -parkingSpot.h/2, parkingSpot.w, parkingSpot.h);
        ctx.strokeStyle = 'white'; ctx.setLineDash([5, 5]);
        ctx.strokeRect(-parkingSpot.w/2, -parkingSpot.h/2, parkingSpot.w, parkingSpot.h);
        ctx.rotate(-parkingSpot.angle); 
        ctx.fillStyle = "white"; ctx.font = "bold 16px sans-serif"; ctx.textAlign = 'center';
        ctx.fillText("+" + (50 * difficultyLevel), 0, 0);
        ctx.restore();
    }

    ctx.font = '30px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    fruits.forEach(f => { 
        ctx.fillText(f.type, f.x, f.y); 
        ctx.fillStyle = "#FFD700"; ctx.font = "12px sans-serif";
        ctx.fillText("+10", f.x, f.y + 25);
        ctx.font = '30px serif';
    });

    if (pointer.active) {
        const vCX = car.x + (L/2) * Math.cos(car.theta);
        const vCY = car.y + (L/2) * Math.sin(car.theta);
        ctx.save(); ctx.translate(vCX, vCY); ctx.rotate(car.theta); ctx.setLineDash([5, 5]);
        const dL = (ag, d, c) => {
            const r = ag * Math.PI / 180;
            ctx.strokeStyle = c; ctx.beginPath(); 
            // Começa 75 pixels (~2.0cm) para trás do ponto de origem
            ctx.moveTo(Math.cos(r) * -75, Math.sin(r) * -75); 
            ctx.lineTo(Math.cos(r) * d, Math.sin(r) * d); 
            ctx.stroke();
        };
        dL(15, 300, 'rgba(100, 255, 100, 0.4)'); dL(-15, 300, 'rgba(100, 255, 100, 0.4)');
        dL(60, 300, 'rgba(255, 100, 100, 0.4)'); dL(-60, 300, 'rgba(255, 100, 100, 0.4)');
        dL(120, 100, 'rgba(255, 100, 100, 0.2)'); dL(-120, 100, 'rgba(255, 100, 100, 0.2)');
        ctx.restore();
    }

    ctx.save();
    ctx.translate(car.x, car.y); ctx.rotate(car.theta);
    const hH = carBodyH / 2;
    ctx.fillStyle = car.color; ctx.fillRect(-10, -hH, carBodyW, carBodyH);
    ctx.strokeStyle = '#333'; ctx.strokeRect(-10, -hH, carBodyW, carBodyH);
    ctx.fillStyle = 'rgba(173, 216, 230, 0.8)';
    ctx.fillRect(L-10, -hH+4, 10, carBodyH-8);
    ctx.fillRect(-6, -hH+4, 8, carBodyH-8);
    ctx.fillRect(12, -hH+2, 20, 4); ctx.fillRect(12, hH-6, 20, 4);
    ctx.fillStyle = '#ffff00';
    ctx.beginPath(); ctx.arc(L+10, -12, 5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(L+10, 12, 5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#A0522D';
    ctx.fillRect(-5, -hH-6, 18, 10); ctx.fillRect(-5, hH-4, 18, 10);
    const dW = (y) => {
        ctx.save(); ctx.translate(L, y); ctx.rotate(car.alpha); ctx.fillStyle = 'red';
        ctx.fillRect(-10, -5, 20, 10); ctx.restore();
    };
    dW(-hH-1); dW(hH+1);
    ctx.restore();
}

function loop() {
    processControl();
    car.x += car.v * Math.cos(car.theta);
    car.y += car.v * Math.sin(car.theta);
    car.theta += (car.v / L) * Math.tan(car.alpha);
    if (car.x < 0) car.x = width; if (car.x > width) car.x = 0;
    if (car.y < 0) car.y = height; if (car.y > height) car.y = 0;
    checkCollisions();
    draw();
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
