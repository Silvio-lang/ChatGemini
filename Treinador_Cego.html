<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Treinador de Orientação - Silvio Aurich</title>
    <style>
        /* --- ESTILOS (CSS) --- */
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f0f0;
            margin: 0;
            overflow: hidden;
            touch-action: none; /* Impede zoom e scroll no celular */
        }
        #controls {
            width: 100%;
            background: #333;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: center;
            gap: 20px;
            align-items: center;
            z-index: 10;
        }
        canvas {
            background-color: #fff;
            display: block;
        }
        #pwm-indicator {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background-color: white;
            border: 2px solid #555;
            opacity: 0;
        }
        #instructions {
            position: absolute;
            bottom: 10px;
            left: 10px;
            right: 10px;
            background: rgba(255,255,255,0.8);
            padding: 10px;
            border-radius: 5px;
            font-size: 0.85em;
            pointer-events: none;
            text-align: center;
        }
        #start-audio {
            padding: 12px 25px;
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 1.1em;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="controls">
    <button id="start-audio">INICIAR TREINAMENTO (ATIVAR SOM)</button>
    <div id="pwm-indicator"></div>
</div>

<canvas id="simCanvas"></canvas>

<div id="instructions">
    <b>PC:</b> Setas (Cima: +Vel, Baixo: -Vel, Esq/Dir: Girar). Espaço: Para. <br>
    <b>Celular (Modo Paisagem):</b> Toque Topo (+Vel), Base (-Vel), Laterais (Girar).
</div>

<script>
/* --- LÓGICA DO APLICATIVO (JAVASCRIPT) --- */

const canvas = document.getElementById('simCanvas');
const ctx = canvas.getContext('2d');
const pwmIndicator = document.getElementById('pwm-indicator');
const startAudioBtn = document.getElementById('start-audio');

// Configurações e Estado
let width, height;
const L = 40;
const GRID_SIZE = 2 * L;

let user = {
    x: 0, y: 0,
    theta: -Math.PI / 2, // Apontando para o topo
    v: 0,
    alpha: 0
};

// Ajuste de Tela
function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    user.x = width / 2;
    user.y = height / 2;
}
window.onresize = resize;
resize();

// --- ÁUDIO (Web Audio API) ---
let audioCtx = null;
let dirOsc = null;  // Direção (PWM)
let dirGain = null;
let stepOsc = null; // Passos (Toc-Toc)
let stepGain = null;

function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // Som de Direção (1000Hz)
    dirOsc = audioCtx.createOscillator();
    dirGain = audioCtx.createGain();
    dirOsc.type = 'sine';
    dirOsc.frequency.setValueAtTime(1000, audioCtx.currentTime);
    dirGain.gain.setValueAtTime(0, audioCtx.currentTime);
    dirOsc.connect(dirGain);
    dirGain.connect(audioCtx.destination);
    dirOsc.start();

    // Som de Passos (400Hz Square)
    stepOsc = audioCtx.createOscillator();
    stepGain = audioCtx.createGain();
    stepOsc.type = 'square';
    stepOsc.frequency.setValueAtTime(400, audioCtx.currentTime);
    stepGain.gain.setValueAtTime(0, audioCtx.currentTime);
    stepOsc.connect(stepGain);
    stepGain.connect(audioCtx.destination);
    stepOsc.start();

    startAudioBtn.style.display = 'none';
}
startAudioBtn.addEventListener('click', initAudio);

// --- CONTROLES ---

// Teclado (PC)
window.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowUp') user.v = Math.min(1, user.v + 0.1);
    else if (e.key === 'ArrowDown') user.v = Math.max(0, user.v - 0.1);
    else if (e.key === 'ArrowLeft') user.alpha = -10;
    else if (e.key === 'ArrowRight') user.alpha = 10;
    else if (e.key === ' ') user.v = 0;
});
window.addEventListener('keyup', (e) => {
    if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') user.alpha = 0;
});

// Touch (Celular)
canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const touch = e.touches[0];
    const tx = touch.clientX;
    const ty = touch.clientY;
    
    if (ty < height * 0.3) user.v = Math.min(1, user.v + 0.1); // Acelerar
    else if (ty > height * 0.7) user.v = Math.max(0, user.v - 0.1); // Frear
    else if (tx < width * 0.5) user.alpha = -10; // Esquerda
    else user.alpha = 10; // Direita
}, {passive: false});

canvas.addEventListener('touchend', () => { user.alpha = 0; }, {passive: false});

// --- DESENHO E ANIMAÇÃO ---

function draw() {
    ctx.clearRect(0, 0, width, height);

    // Grid
    ctx.strokeStyle = '#e0e0e0';
    ctx.lineWidth = 1;
    for (let x = 0; x <= width; x += GRID_SIZE) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, height); ctx.stroke();
    }
    for (let y = 0; y <= height; y += GRID_SIZE) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(width, y); ctx.stroke();
    }

    // Guia Central para Videntes
    const xCentro = width / 2;
    const margem = GRID_SIZE / 4;
    ctx.fillStyle = 'rgba(76, 175, 80, 0.1)';
    ctx.fillRect(xCentro - margem, 0, margem * 2, height);
    ctx.strokeStyle = '#4CAF50';
    ctx.setLineDash([10, 5]);
    ctx.beginPath(); ctx.moveTo(xCentro, 0); ctx.lineTo(xCentro, height); ctx.stroke();
    ctx.setLineDash([]);

    // Personagem (Drone View)
    ctx.save();
    ctx.translate(user.x, user.y);
    ctx.rotate(user.theta);

    const walkCycle = user.v !== 0 ? Math.sin(Date.now() * 0.01 * user.v * 3) : 0;
    const limbSwing = walkCycle * 10;

    ctx.fillStyle = '#2c3e50'; // Calças
    ctx.fillRect(-5 + limbSwing, -8, 12, 6); // Perna E
    ctx.fillRect(-5 - limbSwing, 2, 12, 6);  // Perna D

    ctx.fillStyle = '#e67e22'; // Braços
    ctx.fillRect(2 - limbSwing, -14, 10, 5); // Braço E
    ctx.fillRect(2 + limbSwing, 9, 10, 5);   // Braço D

    ctx.fillStyle = '#3498db'; // Camisa
    ctx.beginPath(); ctx.ellipse(5, 0, 10, 12, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();

    ctx.fillStyle = '#ffdbac'; // Pele
    ctx.beginPath(); ctx.arc(8 + (walkCycle * 2), 0, 6, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    ctx.restore();
}

let lastCycle = 0;

function updateAudio() {
    if (!audioCtx) return;

    // Lógica PWM (Direção)
    const periodoPWM = 1000;
    const now = Date.now();
    const xCentro = width / 2;
    const margem = GRID_SIZE / 4;
    
    let ratio = 0;
    if (user.x <= xCentro - margem) ratio = 0;
    else if (user.x >= xCentro + margem) ratio = 1;
    else ratio = (user.x - (xCentro - margem)) / (margem * 2);
    
    const isAceso = (now % periodoPWM) < (ratio * periodoPWM) && ratio > 0;
    
    pwmIndicator.style.opacity = isAceso ? "1" : "0";
    dirGain.gain.setTargetAtTime(isAceso ? 0.1 : 0, audioCtx.currentTime, 0.01);

    // Lógica Passos (Velocidade)
    if (user.v > 0) {
        const currentCycle = Math.sin(now * 0.01 * user.v * 3);
        // Toca no pico de cada perna
        if ((lastCycle < 0.9 && currentCycle >= 0.9) || (lastCycle > -0.9 && currentCycle <= -0.9)) {
            stepGain.gain.cancelScheduledValues(audioCtx.currentTime);
            stepGain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            stepGain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.05);
        }
        lastCycle = currentCycle;
    } else {
        stepGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.01);
    }
}

function loop() {
    // Física
    const speedScale = 4;
    user.theta += (user.v * Math.sin(user.alpha * Math.PI / 180)) * 0.08;
    user.x += user.v * speedScale * Math.cos(user.theta);
    user.y += user.v * speedScale * Math.sin(user.theta);
    
    // Bordas (Infinito)
    if (user.x < 0) user.x = width;
    if (user.x > width) user.x = 0;
    if (user.y < 0) user.y = height;
    if (user.y > height) user.y = 0;

    draw();
    updateAudio();
    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
