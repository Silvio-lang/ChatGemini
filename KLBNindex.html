<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Osciloscópio B3 Otimizado</title>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <script src="dados.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #000; color: #0f0; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background-color: #111; padding: 10px 20px; border-bottom: 2px solid #0f0; display: flex; justify-content: space-between; align-items: center; }
        #main-container { display: flex; flex: 1; overflow: hidden; }
        #chart-container { flex: 4; background-color: #000; }
        #sidebar { flex: 1.2; background-color: #111; padding: 15px; border-left: 2px solid #0f0; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
        .painel { border: 1px solid #0f0; padding: 12px; border-radius: 5px; background-color: #050505; }
        .valor-display { font-size: 1.5em; font-weight: bold; color: #0f0; margin-top: 5px; }
        .negativo { color: #f00 !important; }
        #controles { padding: 15px; background-color: #111; border-top: 2px solid #0f0; display: flex; align-items: center; gap: 20px; }
        .btn { padding: 10px; background: transparent; border: 1px solid #0f0; color: #0f0; cursor: pointer; font-weight: bold; width: 100%; text-transform: uppercase; }
        .btn:hover { background: #0f0; color: #000; }
        .label-info { font-size: 0.75em; color: #0a0; text-transform: uppercase; }
        input { background: #000; color: #0f0; border: 1px solid #0f0; padding: 5px; width: 100%; box-sizing: border-box; font-family: 'Consolas', monospace; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold;">OSCILOSCÓPIO B3 - KLBN11</div>
    <div id="data-hora-display">AGUARDANDO...</div>
</header>

<div id="main-container">
    <div id="chart-container">
        <div id="plotly-chart" style="width: 100%; height: 100%;"></div>
    </div>

    <div id="sidebar">
        <div class="painel">
            <div class="label-info">Divergência Atual</div>
            <div id="diff-display" class="valor-display">0.00%</div>
        </div>
        <div class="painel">
            <div class="label-info">Carteira (UN)</div>
            <div id="pos-qty-display" class="valor-display">0</div>
            <div style="font-size: 0.8em; margin-top: 5px; color: #888;">P. Médio: <span id="avg-price-display" style="color: #fff;">R$ 0,00</span></div>
        </div>
        <div class="painel">
            <div class="label-info">Lucro Aberto (R$)</div>
            <div id="pnl-real-display" class="valor-display">R$ 0,00</div>
        </div>
        <div class="painel">
            <div class="label-info">Lucro Acumulado</div>
            <div id="total-profit-display" class="valor-display" style="color: #fff;">R$ 0,00</div>
        </div>
        <div class="painel">
            <div class="label-info">Lote</div>
            <input type="number" id="trade-qty" value="1000" step="100" style="margin: 10px 0;">
            <div style="display: flex; gap: 5px;">
                <button class="btn" onclick="executarTrade('compra')">COMPRAR</button>
                <button class="btn" onclick="executarTrade('venda')">VENDER</button>
            </div>
            <button class="btn" style="margin-top: 10px; border-color: #f00; color: #f00;" onclick="zerarTudo()">REALIZAR/ZERAR</button>
            <div id="trade-status" style="font-size: 0.7em; color: #888; margin-top: 8px; text-align: center;">STANDBY</div>
        </div>
    </div>
</div>

<div id="controles">
    <button class="btn" id="btn-play" style="width: 100px;" onclick="togglePlay()">INICIAR</button>
    <div style="flex: 1; display: flex; flex-direction: column;">
        <div class="label-info">Navegação</div>
        <input type="range" id="hour-slider" min="0" value="0" style="width: 100%;" oninput="mudarHora(this.value)">
    </div>
    <div style="width: 120px;">
        <div class="label-info">Velocidade: <span id="speed-val">100</span>ms</div>
        <input type="range" id="speed-slider" min="1" max="1000" value="100" style="width: 100%;" oninput="document.getElementById('speed-val').innerText = this.value">
    </div>
</div>

<script>
    let dadosTratados = [];
    let blocosHoras = []; 
    let horaAtualIdx = 0, minutoNaHora = 0, lucroAcumulado = 0, playInterval = null;
    let posicaoTotal = 0, custoTotal = 0;
    const HORAS_NA_TELA = 24; 

    function prepararDados() {
        // DADOS_HISTORICOS agora é { klbn: [[data, preco], ...], suzb: [[data, preco], ...] }
        const klbnRaw = DADOS_HISTORICOS.klbn;
        const suzbRaw = DADOS_HISTORICOS.suzb;
        const mapSuzb = new Map(suzbRaw.map(i => [i[0], i[1]]));
        
        dadosTratados = [];
        let diaAtual = null, multDesteDia = null, ultimaHoraCheia = null;

        for (let i = 0; i < klbnRaw.length; i++) {
            const dataHora = klbnRaw[i][0];
            const precoKLBN = klbnRaw[i][1];
            const dataPura = dataHora.split(' ')[0];
            const horaCheia = dataHora.split(' ')[1].split(':')[0];
            const precoSUZB = mapSuzb.get(dataHora);
            
            if (precoSUZB === undefined) continue;

            if (dataPura !== diaAtual) {
                if (dadosTratados.length > 0) {
                    const ultimo = dadosTratados[dadosTratados.length - 1];
                    multDesteDia = ultimo.klbn / ultimo.suzb_real;
                } else {
                    multDesteDia = precoKLBN / precoSUZB;
                }
                diaAtual = dataPura;
            }

            if (horaCheia !== ultimaHoraCheia) {
                blocosHoras.push(dadosTratados.length);
                ultimaHoraCheia = horaCheia;
            }

            dadosTratados.push({
                time: dataHora,
                klbn: precoKLBN,
                suzb_real: precoSUZB,
                suzb_adj: precoSUZB * multDesteDia,
                diff: ((precoKLBN / (precoSUZB * multDesteDia)) - 1) * 100
            });
        }
        document.getElementById('hour-slider').max = blocosHoras.length - 1;
        atualizarGrafico();
    }

    function togglePlay() {
        if (playInterval) { clearInterval(playInterval); playInterval = null; document.getElementById('btn-play').innerText = "INICIAR"; }
        else {
            document.getElementById('btn-play').innerText = "PARAR";
            const motor = () => {
                minutoNaHora++;
                let prox = (horaAtualIdx + 1 < blocosHoras.length) ? blocosHoras[horaAtualIdx + 1] : dadosTratados.length;
                if ((blocosHoras[horaAtualIdx] + minutoNaHora) >= prox) { minutoNaHora = 0; horaAtualIdx++; if (horaAtualIdx >= blocosHoras.length) { togglePlay(); return; } }
                atualizarGrafico();
                if (playInterval) { clearInterval(playInterval); playInterval = setInterval(motor, parseInt(document.getElementById('speed-slider').value)); }
            };
            playInterval = setInterval(motor, parseInt(document.getElementById('speed-slider').value));
        }
    }

    function mudarHora(h) { if (playInterval) togglePlay(); horaAtualIdx = parseInt(h); minutoNaHora = 0; atualizarGrafico(); }

    function atualizarGrafico() {
        const inicio = Math.max(0, horaAtualIdx - HORAS_NA_TELA + 1);
        let xArr = [], yK = [], yS = [], tArr = [];

        for (let h = inicio; h <= horaAtualIdx; h++) {
            const iStart = blocosHoras[h];
            const iNext = (h + 1 < blocosHoras.length) ? blocosHoras[h+1] : dadosTratados.length;
            const iFin = iStart + (h === horaAtualIdx ? minutoNaHora : (iNext - iStart - 1));
            if (iFin >= dadosTratados.length) continue;
            xArr.push(h); yK.push(dadosTratados[iFin].klbn); yS.push(dadosTratados[iFin].suzb_adj); tArr.push(dadosTratados[iFin].time);
        }

        Plotly.react('plotly-chart', [
            { x: xArr, y: yK, mode: 'lines+markers', name: 'KLBN11', line: {color: '#0ff', width: 4}, marker: {size: 6} },
            { x: xArr, y: yS, mode: 'lines+markers', name: 'SUZB3', line: {color: '#fa0', width: 1.5}, marker: {size: 4} }
        ], {
            paper_bgcolor: '#000', plot_bgcolor: '#000', margin: { t: 40, r: 20, b: 40, l: 50 },
            showlegend: true, legend: { font: { color: '#0f0' }, orientation: 'h', y: 1.15 },
            xaxis: { color: '#0f0', gridcolor: '#030', range: [inicio, inicio + HORAS_NA_TELA], tickmode: 'array', tickvals: xArr, ticktext: tArr.map(l => l.split(' ')[1].substring(0,5)) },
            yaxis: { color: '#0f0', gridcolor: '#030', autorange: true }
        });

        const atual = dadosTratados[blocosHoras[horaAtualIdx] + minutoNaHora];
        document.getElementById('data-hora-display').innerText = atual.time;
        document.getElementById('diff-display').innerText = atual.diff.toFixed(2) + '%';
        document.getElementById('pos-qty-display').innerText = posicaoTotal;
        document.getElementById('pos-qty-display').style.color = posicaoTotal > 0 ? '#0ff' : (posicaoTotal < 0 ? '#fa0' : '#0f0');
        const precoMedio = (posicaoTotal !== 0) ? Math.abs(custoTotal / posicaoTotal) : 0;
        document.getElementById('avg-price-display').innerText = 'R$ ' + precoMedio.toLocaleString('pt-BR', {minimumFractionDigits: 2});
        let lucroAberto = (posicaoTotal !== 0) ? (atual.klbn * posicaoTotal) - custoTotal : 0;
        document.getElementById('pnl-real-display').innerText = 'R$ ' + lucroAberto.toLocaleString('pt-BR', {minimumFractionDigits: 2});
        document.getElementById('pnl-real-display').className = 'valor-display ' + (lucroAberto < 0 ? 'negativo' : '');
        document.getElementById('total-profit-display').innerText = 'R$ ' + lucroAcumulado.toLocaleString('pt-BR', {minimumFractionDigits: 2});
    }

    function executarTrade(tipo) {
        const atual = dadosTratados[blocosHoras[horaAtualIdx] + minutoNaHora];
        const qty = parseInt(document.getElementById('trade-qty').value);
        if (tipo === 'compra') { posicaoTotal += qty; custoTotal += (atual.klbn * qty); }
        else { posicaoTotal -= qty; custoTotal -= (atual.klbn * qty); }
        document.getElementById('trade-status').innerText = `EXECUTADO: ${tipo === 'compra' ? 'COMPRA' : 'VENDA'} ${qty} UN`;
        atualizarGrafico();
    }

    function zerarTudo() {
        const atual = dadosTratados[blocosHoras[horaAtualIdx] + minutoNaHora];
        if (posicaoTotal !== 0) {
            const lucroFinal = (atual.klbn * posicaoTotal) - custoTotal;
            lucroAcumulado += lucroFinal;
            document.getElementById('trade-status').innerText = `ZERADO: R$ ${lucroFinal.toFixed(2)}`;
        }
        posicaoTotal = 0; custoTotal = 0; atualizarGrafico();
    }
    window.onload = prepararDados;
</script>
</body>
</html>
