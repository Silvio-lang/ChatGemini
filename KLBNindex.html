<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Osciloscópio B3 - KLBN11</title>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <script src="KLBNdados.js"></script>
    <style>
        /* Reset e Base */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #000; 
            color: #0f0; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; /* Permite que a página cresça se necessário */
            font-size: 14px;
        }
        
        header { 
            background-color: #111; 
            padding: 5px 15px; 
            border-bottom: 1px solid #0f0; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            height: 35px; 
            flex-shrink: 0;
        }

        /* Container Principal */
        #main-container { 
            display: flex; 
            flex: 1; 
            flex-direction: row;
            overflow: visible; /* Permite ver tudo */
        }

        #chart-container { 
            flex: 3; 
            background-color: #000; 
            min-height: 300px; /* Garante espaço para o gráfico */
        }

        #sidebar { 
            flex: 1; 
            background-color: #111; 
            padding: 10px; 
            border-left: 2px solid #0f0; 
            display: flex; 
            flex-direction: column; 
            gap: 10px;
            min-width: 200px;
        }

        /* Painéis e Displays */
        .painel { 
            border: 1px solid #0f0; 
            padding: 8px; 
            border-radius: 5px; 
            background-color: #050505; 
        }
        
        .valor-display { 
            font-size: 1.3em; 
            font-weight: bold; 
            color: #0f0; 
        }
        
        .negativo { color: #f00 !important; }

        /* Controles Inferiores */
        #controles { 
            padding: 10px; 
            background-color: #111; 
            border-top: 2px solid #0f0; 
            display: flex; 
            flex-wrap: wrap; /* Permite quebrar linha no celular se faltar espaço */
            align-items: center; 
            gap: 15px; 
            flex-shrink: 0;
        }

        .btn { 
            padding: 8px; 
            background: transparent; 
            border: 1px solid #0f0; 
            color: #0f0; 
            cursor: pointer; 
            font-weight: bold; 
            text-transform: uppercase;
        }
        
        .btn:hover { background: #0f0; color: #000; }

        .label-info { font-size: 0.7em; color: #0a0; text-transform: uppercase; }

        input { 
            background: #000; 
            color: #0f0; 
            border: 1px solid #0f0; 
            padding: 5px; 
            font-family: 'Consolas', monospace;
        }

        /* --- AJUSTES PARA CELULAR (MODO PAISAGEM E RETRATO) --- */
        @media (max-width: 800px) {
            #main-container { flex-direction: column; } /* Sidebar vai pra baixo no celular vertical */
            #sidebar { border-left: none; border-top: 2px solid #0f0; width: auto; }
            header { font-size: 0.8em; }
        }

        @media (max-height: 500px) {
            body { overflow-y: auto; } /* Permite rolar se a tela for muito baixa */
            header { height: 30px; }
            #controles { position: relative; bottom: 0; width: 100%; box-sizing: border-box; }
        }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold;">OSCILOSCÓPIO FINANCEIRO - KLBN11</div>
    <div id="data-hora-display">AGUARDANDO...</div>
</header>

<div id="main-container">
    <div id="chart-container">
        <div id="plotly-chart" style="width: 100%; height: 100%;"></div>
    </div>

    <div id="sidebar">
        <div class="painel">
            <div class="label-info">Divergência Atual</div>
            <div id="diff-display" class="valor-display">0.00%</div>
        </div>

        <div class="painel">
            <div class="label-info">Carteira / Preço Médio</div>
            <div style="display: flex; justify-content: space-between; align-items: baseline;">
                <div id="pos-qty-display" class="valor-display">0</div>
                <div id="avg-price-display" style="color: #fff; font-size: 0.9em;">R$ 0,00</div>
            </div>
        </div>

        <div class="painel">
            <div class="label-info">Lucro Aberto / Acumulado</div>
            <div id="pnl-real-display" class="valor-display">R$ 0,00</div>
            <div id="total-profit-display" style="color: #aaa; font-size: 0.9em; margin-top: 5px;">Total: R$ 0,00</div>
        </div>

        <div class="painel">
            <div class="label-info">Negociar Lote</div>
            <input type="number" id="trade-qty" value="1000" step="100" style="margin: 5px 0; width: 100%;">
            <div style="display: flex; gap: 5px;">
                <button class="btn" style="flex: 1; border-color: #0ff; color: #0ff;" onclick="executarTrade('compra')">COMPRAR</button>
                <button class="btn" style="flex: 1; border-color: #fa0; color: #fa0;" onclick="executarTrade('venda')">VENDER</button>
            </div>
            <button class="btn" style="margin-top: 8px; border-color: #f00; color: #f00; width: 100%; font-size: 0.8em;" onclick="zerarTudo()">ZERAR TUDO</button>
            <div id="trade-status" style="font-size: 0.7em; color: #888; margin-top: 5px; text-align: center;">STANDBY</div>
        </div>
    </div>
</div>

<div id="controles">
    <button class="btn" id="btn-play" style="min-width: 100px; height: 40px;" onclick="togglePlay()">INICIAR</button>
    
    <div style="flex: 2; min-width: 150px;">
        <div class="label-info">Navegação Horária</div>
        <input type="range" id="hour-slider" min="0" value="0" style="width: 100%; height: 30px;" oninput="mudarHora(this.value)">
    </div>
    
    <div style="flex: 1; min-width: 100px;">
        <div class="label-info">Velocidade: <span id="speed-val">100</span>ms</div>
        <input type="range" id="speed-slider" min="1" max="1000" value="100" style="width: 100%;" oninput="document.getElementById('speed-val').innerText = this.value">
    </div>
</div>

<script>
    // --- VARIÁVEIS GLOBAIS ---
    let dadosTratados = [];
    let blocosHoras = []; 
    let horaAtualIdx = 0, minutoNaHora = 0, lucroAcumulado = 0, playInterval = null;
    let posicaoTotal = 0, precoMedio = 0;
    const HORAS_NA_TELA = 24;

    function prepararDados() {
        const klbnRaw = DADOS_HISTORICOS.klbn;
        const suzbRaw = DADOS_HISTORICOS.suzb;
        const mapSuzb = new Map(suzbRaw.map(i => [i[0], i[1]]));
        dadosTratados = [];
        let diaAtual = null, multDesteDia = null, ultimaHoraCheia = null;

        for (let i = 0; i < klbnRaw.length; i++) {
            const dataHora = klbnRaw[i][0];
            const precoKLBN = klbnRaw[i][1];
            const dataPura = dataHora.split(' ')[0];
            const horaCheia = dataHora.split(' ')[1].split(':')[0];
            const precoSUZB = mapSuzb.get(dataHora);
            if (precoSUZB === undefined) continue;

            if (dataPura !== diaAtual) {
                if (dadosTratados.length > 0) {
                    const ultimo = dadosTratados[dadosTratados.length - 1];
                    multDesteDia = ultimo.klbn / ultimo.suzb_real;
                } else { multDesteDia = precoKLBN / precoSUZB; }
                diaAtual = dataPura;
            }
            if (horaCheia !== ultimaHoraCheia) {
                blocosHoras.push(dadosTratados.length);
                ultimaHoraCheia = horaCheia;
            }
            dadosTratados.push({
                time: dataHora,
                klbn: precoKLBN,
                suzb_real: precoSUZB,
                suzb_adj: precoSUZB * multDesteDia,
                diff: ((precoKLBN / (precoSUZB * multDesteDia)) - 1) * 100
            });
        }
        document.getElementById('hour-slider').max = blocosHoras.length - 1;
        atualizarGrafico();
    }

    function togglePlay() {
        if (playInterval) { clearInterval(playInterval); playInterval = null; document.getElementById('btn-play').innerText = "INICIAR"; }
        else {
            document.getElementById('btn-play').innerText = "PARAR";
            const motor = () => {
                minutoNaHora++;
                let prox = (horaAtualIdx + 1 < blocosHoras.length) ? blocosHoras[horaAtualIdx + 1] : dadosTratados.length;
                if ((blocosHoras[horaAtualIdx] + minutoNaHora) >= prox) {
                    minutoNaHora = 0; horaAtualIdx++;
                    if (horaAtualIdx >= blocosHoras.length) { togglePlay(); return; }
                }
                atualizarGrafico();
                if (playInterval) { clearInterval(playInterval); playInterval = setInterval(motor, parseInt(document.getElementById('speed-slider').value)); }
            };
            playInterval = setInterval(motor, parseInt(document.getElementById('speed-slider').value));
        }
    }

    function mudarHora(h) { if (playInterval) togglePlay(); horaAtualIdx = parseInt(h); minutoNaHora = 0; atualizarGrafico(); }

    function atualizarGrafico() {
        if (dadosTratados.length === 0) return;
        const inicio = Math.max(0, horaAtualIdx - HORAS_NA_TELA + 1);
        let xArr = [], yK = [], yS = [], tArr = [];

        for (let h = inicio; h <= horaAtualIdx; h++) {
            const idxInicio = blocosHoras[h];
            const idxNext = (h + 1 < blocosHoras.length) ? blocosHoras[h+1] : dadosTratados.length;
            const idxFinal = idxInicio + (h === horaAtualIdx ? minutoNaHora : (idxNext - idxInicio - 1));
            if (idxFinal >= dadosTratados.length) continue;
            xArr.push(h); yK.push(dadosTratados[idxFinal].klbn); yS.push(dadosTratados[idxFinal].suzb_adj); tArr.push(dadosTratados[idxFinal].time);
        }

        Plotly.react('plotly-chart', [
            { x: xArr, y: yK, mode: 'lines+markers', name: 'KLBN11', line: {color: '#0ff', width: 3}, marker: {size: 5} },
            { x: xArr, y: yS, mode: 'lines+markers', name: 'SUZB3', line: {color: '#fa0', width: 1}, marker: {size: 3} }
        ], {
            paper_bgcolor: '#000', plot_bgcolor: '#000', margin: { t: 30, r: 10, b: 30, l: 40 },
            showlegend: false,
            xaxis: { color: '#0f0', gridcolor: '#030', range: [inicio, inicio + HORAS_NA_TELA], tickmode: 'array', tickvals: xArr, ticktext: tArr.map(l => l.split(' ')[1].substring(0,5)) },
            yaxis: { color: '#0f0', gridcolor: '#030', autorange: true }
        });

        const atual = dadosTratados[blocosHoras[horaAtualIdx] + minutoNaHora];
        if (!atual) return;
        
        document.getElementById('data-hora-display').innerText = atual.time;
        document.getElementById('diff-display').innerText = atual.diff.toFixed(2) + '%';
        document.getElementById('pos-qty-display').innerText = posicaoTotal;
        document.getElementById('pos-qty-display').style.color = posicaoTotal > 0 ? '#0ff' : (posicaoTotal < 0 ? '#fa0' : '#0f0');
        document.getElementById('avg-price-display').innerText = 'P.M.: R$ ' + precoMedio.toFixed(2);

        let lucroAberto = (posicaoTotal > 0) ? (atual.klbn - precoMedio) * posicaoTotal : (posicaoTotal < 0 ? (precoMedio - atual.klbn) * Math.abs(posicaoTotal) : 0);
        document.getElementById('pnl-real-display').innerText = 'R$ ' + lucroAberto.toLocaleString('pt-BR', {minimumFractionDigits: 2});
        document.getElementById('pnl-real-display').className = 'valor-display ' + (lucroAberto < 0 ? 'negativo' : '');
        document.getElementById('total-profit-display').innerText = 'Acumulado: R$ ' + lucroAcumulado.toLocaleString('pt-BR', {minimumFractionDigits: 2});
    }

    function executarTrade(tipo) {
        const atual = dadosTratados[blocosHoras[horaAtualIdx] + minutoNaHora];
        const qty = parseInt(document.getElementById('trade-qty').value);
        const precoAtual = atual.klbn;

        if (tipo === 'compra') {
            if (posicaoTotal >= 0) {
                precoMedio = ((posicaoTotal * precoMedio) + (qty * precoAtual)) / (posicaoTotal + qty);
                posicaoTotal += qty;
            } else {
                const qtyReduzir = Math.min(qty, Math.abs(posicaoTotal));
                lucroAcumulado += (precoMedio - precoAtual) * qtyReduzir;
                posicaoTotal += qtyReduzir;
                if (qty > qtyReduzir) { posicaoTotal = (qty - qtyReduzir); precoMedio = precoAtual; }
                else if (posicaoTotal === 0) precoMedio = 0;
            }
        } else {
            if (posicaoTotal <= 0) {
                precoMedio = ((Math.abs(posicaoTotal) * precoMedio) + (qty * precoAtual)) / (Math.abs(posicaoTotal) + qty);
                posicaoTotal -= qty;
            } else {
                const qtyReduzir = Math.min(qty, posicaoTotal);
                lucroAcumulado += (precoAtual - precoMedio) * qtyReduzir;
                posicaoTotal -= qtyReduzir;
                if (qty > qtyReduzir) { posicaoTotal = -(qty - qtyReduzir); precoMedio = precoAtual; }
                else if (posicaoTotal === 0) precoMedio = 0;
            }
        }
        document.getElementById('trade-status').innerText = `ORDEM: ${tipo.toUpperCase()} ${qty}`;
        atualizarGrafico();
    }

    function zerarTudo() {
        const atual = dadosTratados[blocosHoras[horaAtualIdx] + minutoNaHora];
        if (posicaoTotal !== 0) {
            lucroAcumulado += (posicaoTotal > 0) ? (atual.klbn - precoMedio) * posicaoTotal : (precoMedio - atual.klbn) * Math.abs(posicaoTotal);
        }
        posicaoTotal = 0; precoMedio = 0; document.getElementById('trade-status').innerText = "ZERADO";
        atualizarGrafico();
    }
    window.onload = prepararDados;
</script>
</body>
</html>
