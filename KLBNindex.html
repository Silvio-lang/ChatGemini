<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Osciloscópio B3 - KLBN11</title>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <script src="KLBNdados.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #000; color: #0f0; margin: 0; display: flex; flex-direction: column; min-height: 100vh; font-size: 13px; }
        header { background-color: #111; padding: 5px 15px; border-bottom: 1px solid #0f0; display: flex; justify-content: space-between; align-items: center; height: 30px; flex-shrink: 0; }
        
        #main-container { display: flex; flex: 1; flex-direction: row; overflow: visible; }
        #chart-area { flex: 4; display: flex; flex-direction: column; min-width: 0; }
        #chart-container { flex: 1; background-color: #000; min-height: 250px; }
        
        /* Barra de Ação Rápida abaixo do Gráfico */
        #action-bar { background-color: #111; border-top: 1px solid #0f0; padding: 8px; display: flex; gap: 8px; justify-content: center; align-items: center; }
        .btn-action { flex: 1; padding: 12px 5px; font-weight: bold; border: 1px solid #0f0; background: transparent; color: #0f0; cursor: pointer; text-transform: uppercase; border-radius: 4px; }
        .btn-buy { border-color: #0ff; color: #0ff; }
        .btn-sell { border-color: #fa0; color: #fa0; }
        .btn-zero { border-color: #f00; color: #f00; font-size: 0.8em; }

        #sidebar { flex: 1.2; background-color: #111; padding: 10px; border-left: 1px solid #0f0; display: flex; flex-direction: column; gap: 8px; min-width: 180px; }
        .painel { border: 1px solid #0f0; padding: 6px; border-radius: 4px; background-color: #050505; }
        .valor-display { font-size: 1.2em; font-weight: bold; color: #0f0; }
        .negativo { color: #f00 !important; }
        
        /* Lucro Aberto Compacto */
        .lucro-compacto { display: flex; justify-content: space-between; align-items: center; font-size: 0.9em; padding: 2px 0; }
        .lucro-val { font-weight: bold; font-family: 'Consolas', monospace; }

        #controles { padding: 10px; background-color: #111; border-top: 2px solid #0f0; display: flex; flex-wrap: wrap; align-items: center; gap: 10px; flex-shrink: 0; }
        .label-info { font-size: 0.65em; color: #0a0; text-transform: uppercase; }
        input { background: #000; color: #0f0; border: 1px solid #0f0; padding: 4px; font-family: 'Consolas', monospace; width: 100%; }
        
        @media (max-width: 800px) { 
            #main-container { flex-direction: column; } 
            #sidebar { border-left: none; border-top: 1px solid #0f0; width: auto; }
        }
        @media (max-height: 500px) { body { overflow-y: auto; } header { height: 25px; } }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold;">OSCILOSCÓPIO FINANCEIRO - KLBN11</div>
    <div id="data-hora-display">OFFLINE</div>
</header>

<div id="main-container">
    <div id="chart-area">
        <div id="chart-container">
            <div id="plotly-chart" style="width: 100%; height: 100%;"></div>
        </div>
        <!-- BOTOES EM UMA LINHA SO ABAIXO DO GRAFICO -->
        <div id="action-bar">
            <button class="btn-action btn-buy" onclick="executarTrade('compra')">COMPRAR</button>
            <button class="btn-action btn-sell" onclick="executarTrade('venda')">VENDER</button>
            <button class="btn-action btn-zero" onclick="zerarTudo()">ZERAR TUDO</button>
        </div>
    </div>

    <div id="sidebar">
        <div class="painel">
            <div class="label-info">Divergência / Mult</div>
            <div style="display: flex; justify-content: space-between; align-items: baseline;">
                <div id="diff-display" class="valor-display">0.00%</div>
                <div id="v-mult" style="color: #fa0; font-size: 0.8em;">Mult: 1.0000</div>
            </div>
        </div>

        <div class="painel">
            <div class="label-info">Carteira / Preço Médio</div>
            <div style="display: flex; justify-content: space-between; align-items: baseline;">
                <div id="pos-qty-display" class="valor-display">0</div>
                <div id="avg-price-display" style="color: #fff; font-size: 0.85em;">R$ 0,00</div>
            </div>
            <!-- LUCRO ABRETO COMPACTO DENTRO DO PAINEL DE CARTEIRA -->
            <div class="lucro-compacto">
                <span class="label-info" style="text-transform: none;">Lucro Aberto:</span>
                <span id="pnl-real-display" class="lucro-val">R$ 0,00</span>
            </div>
        </div>

        <div class="painel">
            <div class="label-info">Lucro Acumulado</div>
            <div id="total-profit-display" class="valor-display" style="color: #fff; font-size: 1.1em;">R$ 0,00</div>
        </div>

        <div class="painel">
            <div class="label-info">Lote</div>
            <input type="number" id="trade-qty" value="1000" step="100">
            <div id="trade-status" style="font-size: 0.65em; color: #888; margin-top: 5px; text-align: center;">AGUARDANDO</div>
        </div>
    </div>
</div>

<div id="controles">
    <button onclick="togglePlay()" id="btn-play" style="padding: 10px; background: transparent; border: 1px solid #0f0; color: #0f0; font-weight: bold; min-width: 80px;">INICIAR</button>
    <div style="flex: 2;">
        <div class="label-info">Navegação Horária</div>
        <input type="range" id="hour-slider" min="0" value="0" oninput="mudarHora(this.value)">
    </div>
    <div style="flex: 1;">
        <div class="label-info">Velocidade</div>
        <input type="range" id="speed-slider" min="10" max="1000" value="100" oninput="atualizarLabelVelocidade(this.value)">
        <div id="speed-val" style="font-size: 0.6em; text-align: center;">Nível: 10</div>
    </div>
</div>

<script>
    let dadosTratados = [];
    let blocosHoras = []; 
    let horaAtualIdx = 0, minutoNaHora = 0, lucroAcumulado = 0, playInterval = null;
    let posicaoTotal = 0, precoMedio = 0;
    const HORAS_NA_TELA = 24;

    function atualizarLabelVelocidade(v) {
        // v é o valor do slider (10 a 1000). 
        // Maior v deve ser Mais Rápido.
        const nivel = Math.round(v / 10);
        document.getElementById('speed-val').innerText = "Nível: " + nivel;
    }

    function prepararDados() {
        const klbnRaw = DADOS_HISTORICOS.klbn;
        const suzbRaw = DADOS_HISTORICOS.suzb;
        const mapSuzb = new Map(suzbRaw.map(i => [i[0], i[1]]));
        dadosTratados = [];
        let diaAtual = null, multDesteDia = 1, ultimaHoraCheia = null;
        for (let i = 0; i < klbnRaw.length; i++) {
            const dataHora = klbnRaw[i][0];
            const precoKLBN = klbnRaw[i][1];
            const precoSUZB = mapSuzb.get(dataHora);
            if (precoSUZB === undefined) continue;
            const dataPura = dataHora.split(' ')[0];
            const horaCheia = dataHora.split(' ')[1].split(':')[0];
            if (dataPura !== diaAtual) {
                if (dadosTratados.length > 0) {
                    const ultimo = dadosTratados[dadosTratados.length - 1];
                    multDesteDia = ultimo.klbn / ultimo.suzb_real;
                } else { multDesteDia = precoKLBN / precoSUZB; }
                diaAtual = dataPura;
            }
            if (horaCheia !== ultimaHoraCheia) { blocosHoras.push(dadosTratados.length); ultimaHoraCheia = horaCheia; }
            dadosTratados.push({ time: dataHora, klbn: precoKLBN, suzb_real: precoSUZB, suzb_adj: precoSUZB * multDesteDia, diff: ((precoKLBN / (precoSUZB * multDesteDia)) - 1) * 100, mult: multDesteDia });
        }
        document.getElementById('hour-slider').max = blocosHoras.length - 1;
        atualizarLabelVelocidade(document.getElementById('speed-slider').value);
        atualizarGrafico();
    }

    function togglePlay() {
        if (playInterval) { clearInterval(playInterval); playInterval = null; document.getElementById('btn-play').innerText = "INICIAR"; }
        else {
            document.getElementById('btn-play').innerText = "PARAR";
            const motor = () => {
                minutoNaHora++;
                let prox = (horaAtualIdx + 1 < blocosHoras.length) ? blocosHoras[horaAtualIdx + 1] : dadosTratados.length;
                if ((blocosHoras[horaAtualIdx] + minutoNaHora) >= prox) { minutoNaHora = 0; horaAtualIdx++; if (horaAtualIdx >= blocosHoras.length) { togglePlay(); return; } }
                atualizarGrafico();
                if (playInterval) {
                    clearInterval(playInterval);
                    const v = parseInt(document.getElementById('speed-slider').value);
                    const delay = 1010 - v; // Inversão para que MAIOR v = MENOR delay
                    playInterval = setInterval(motor, delay);
                }
            };
            const vInicial = parseInt(document.getElementById('speed-slider').value);
            playInterval = setInterval(motor, 1010 - vInicial);
        }
    }

    function mudarHora(h) { if (playInterval) togglePlay(); horaAtualIdx = parseInt(h); minutoNaHora = 0; atualizarGrafico(); }

    function atualizarGrafico() {
        if (dadosTratados.length === 0) return;
        const inicio = Math.max(0, horaAtualIdx - HORAS_NA_TELA + 1);
        let xArr = [], yK = [], yS = [], tArr = [];
        for (let h = inicio; h <= horaAtualIdx; h++) {
            const idxInicio = blocosHoras[h];
            const idxNext = (h + 1 < blocosHoras.length) ? blocosHoras[h+1] : dadosTratados.length;
            const idxFinal = idxInicio + (h === horaAtualIdx ? minutoNaHora : (idxNext - idxInicio - 1));
            if (idxFinal >= dadosTratados.length) continue;
            xArr.push(h); yK.push(dadosTratados[idxFinal].klbn); yS.push(dadosTratados[idxFinal].suzb_adj); tArr.push(dadosTratados[idxFinal].time);
        }
        Plotly.react('plotly-chart', [
            { x: xArr, y: yK, mode: 'lines+markers', name: 'KLBN11', line: {color: '#0ff', width: 3}, marker: {size: 5} },
            { x: xArr, y: yS, mode: 'lines+markers', name: 'SUZB3', line: {color: '#fa0', width: 1}, marker: {size: 3} }
        ], {
            paper_bgcolor: '#000', plot_bgcolor: '#000', margin: { t: 30, r: 10, b: 30, l: 40 },
            showlegend: true, legend: { font: { color: '#0f0', size: 10 }, orientation: 'h', y: 1.15 },
            xaxis: { color: '#0f0', gridcolor: '#030', range: [inicio, inicio + HORAS_NA_TELA], tickmode: 'array', tickvals: xArr, ticktext: tArr.map(l => l.split(' ')[1].substring(0,5)) },
            yaxis: { color: '#0f0', gridcolor: '#030', autorange: true }
        });
        const atual = dadosTratados[blocosHoras[horaAtualIdx] + minutoNaHora];
        document.getElementById('data-hora-display').innerText = atual.time;
        document.getElementById('diff-display').innerText = atual.diff.toFixed(2) + '%';
        document.getElementById('v-mult').innerText = "M: " + atual.mult.toFixed(4);
        document.getElementById('pos-qty-display').innerText = posicaoTotal;
        document.getElementById('pos-qty-display').style.color = posicaoTotal > 0 ? '#0ff' : (posicaoTotal < 0 ? '#fa0' : '#0f0');
        document.getElementById('avg-price-display').innerText = 'PM: R$' + precoMedio.toFixed(2);
        let lucroAberto = (posicaoTotal > 0) ? (atual.klbn - precoMedio) * posicaoTotal : (posicaoTotal < 0 ? (precoMedio - atual.klbn) * Math.abs(posicaoTotal) : 0);
        document.getElementById('pnl-real-display').innerText = 'R$ ' + lucroAberto.toLocaleString('pt-BR', {minimumFractionDigits: 2});
        document.getElementById('pnl-real-display').className = 'lucro-val ' + (lucroAberto < 0 ? 'negativo' : '');
        document.getElementById('total-profit-display').innerText = 'R$ ' + lucroAcumulado.toLocaleString('pt-BR', {minimumFractionDigits: 2});
    }

    function executarTrade(tipo) {
        const atual = dadosTratados[blocosHoras[horaAtualIdx] + minutoNaHora];
        const qty = parseInt(document.getElementById('trade-qty').value);
        const precoAtual = atual.klbn;
        if (tipo === 'compra') {
            if (posicaoTotal >= 0) { precoMedio = ((posicaoTotal * precoMedio) + (qty * precoAtual)) / (posicaoTotal + qty); posicaoTotal += qty; }
            else {
                const qtyReduzir = Math.min(qty, Math.abs(posicaoTotal));
                lucroAcumulado += (precoMedio - precoAtual) * qtyReduzir;
                posicaoTotal += qtyReduzir;
                if (qty > qtyReduzir) { posicaoTotal = (qty - qtyReduzir); precoMedio = precoAtual; } else if (posicaoTotal === 0) precoMedio = 0;
            }
        } else {
            if (posicaoTotal <= 0) { precoMedio = ((Math.abs(posicaoTotal) * precoMedio) + (qty * precoAtual)) / (Math.abs(posicaoTotal) + qty); posicaoTotal -= qty; }
            else {
                const qtyReduzir = Math.min(qty, posicaoTotal);
                lucroAcumulado += (precoAtual - precoMedio) * qtyReduzir;
                posicaoTotal -= qtyReduzir;
                if (qty > qtyReduzir) { posicaoTotal = -(qty - qtyReduzir); precoMedio = precoAtual; } else if (posicaoTotal === 0) precoMedio = 0;
            }
        }
        document.getElementById('trade-status').innerText = `ORDEM: ${tipo.toUpperCase()} ${qty}`;
        atualizarGrafico();
    }

    function zerarTudo() {
        const atual = dadosTratados[blocosHoras[horaAtualIdx] + minutoNaHora];
        if (posicaoTotal !== 0) { lucroAcumulado += (posicaoTotal > 0) ? (atual.klbn - precoMedio) * posicaoTotal : (precoMedio - atual.klbn) * Math.abs(posicaoTotal); }
        posicaoTotal = 0; precoMedio = 0; document.getElementById('trade-status').innerText = "ZERADO";
        atualizarGrafico();
    }
    window.onload = prepararDados;
</script>
</body>
</html>
